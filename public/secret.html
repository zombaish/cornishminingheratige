<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Node</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            padding: 10px 20px;
            background: #050505;
            border-bottom: 2px solid #00ff00;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-link {
            color: #00ff00;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #00ff00;
            padding: 8px 12px;
            background: #111;
        }
        .nav-link:hover {
            background: #00ff00;
            color: #000;
        }
        .prompt-text {
            font-weight: bold;
        }
        .proxy-form {
            display: flex;
            flex-grow: 1;
            gap: 10px;
        }
        .proxy-input {
            flex-grow: 1;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
        }
        .proxy-input:focus {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .proxy-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
        }
        .proxy-btn:hover {
            background: #00cc00;
        }
        .proxy-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #ffffff; 
            display: none; /* Hidden until a URL is loaded */
        }
        .standby-screen {
            padding: 2rem;
            font-size: 1.2rem;
            line-height: 2;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/" class="nav-link">[EXIT]</a>
    <span class="prompt-text">root@vault:~#</span>
    
    <form id="proxy-form" class="proxy-form">
        <input type="text" id="url-input" class="proxy-input" placeholder="Enter target URL (e.g., https://google.com)..." required autofocus autocomplete="off">
        <button type="submit" class="proxy-btn">EXECUTE</button>
    </form>
</div>

<div id="standby" class="standby-screen">
    <p>> AUTHENTICATION BYPASS SUCCESSFUL.</p>
    <p>> ENCRYPTED TUNNEL PROTOCOL INITIALIZED.</p>
    <p>> AWAITING TARGET ADDRESS INPUT <span class="blink">_</span></p>
</div>

<iframe id="proxy-frame" class="proxy-frame"></iframe>

<script>
    // Placeholder script: Once you install Ultraviolet, you will link this script 
    // to encode the URL and pass it into the iframe.
    const form = document.getElementById('proxy-form');
    const input = document.getElementById('url-input');
    const iframe = document.getElementById('proxy-frame');
    const standby = document.getElementById('standby');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Hide standby text, show the full-screen iframe
        standby.style.display = 'none';
        iframe.style.display = 'block';

        // NOTE: This currently just loads the raw URL. 
        // Once your Ultraviolet backend is running, you will change this 
        // to encode the URL through your proxy route (e.g., /uv/service/...)
        iframe.src = input.value; 
    });
</script>

</body>
</html>
